
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Site Builder | Standalone HTML</title>
  <style>
    :root{
      --bg:#0a0a0a;
      --panel:#121212;
      --panel-2:#171717;
      --line:rgba(255,255,255,.10);
      --line-2:rgba(255,255,255,.16);
      --text:#f5f5f5;
      --muted:#b3b3b3;
      --soft:#8a8a8a;
      --white:#fff;
      --black:#000;
      --accent:#ffffff;
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --max:1200px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height:1.5;
    }

    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}
    button,input,textarea{font:inherit}

    .container{max-width:var(--max);margin:0 auto;padding:0 24px}
    .section{padding:72px 0}
    .border-top{border-top:1px solid var(--line)}
    .border-bottom{border-bottom:1px solid var(--line)}
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
    }
    .panel-soft{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
    }
    .eyebrow{
      font-size:.76rem;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:var(--soft);
      margin:0 0 10px;
    }
    h1,h2,h3,p{margin:0}
    h1{
      font-size:clamp(2.75rem,6vw,5.25rem);
      line-height:1;
      letter-spacing:-.03em;
    }
    h2{
      font-size:clamp(2rem,4vw,3rem);
      line-height:1.08;
      letter-spacing:-.02em;
    }
    h3{font-size:1.2rem}
    p.lead{
      font-size:clamp(1.05rem,1.8vw,1.35rem);
      color:#d5d5d5;
      line-height:1.75;
    }
    p.body{
      color:var(--muted);
      line-height:1.85;
    }

    .topbar{
      position:sticky;top:0;z-index:50;
      backdrop-filter: blur(12px);
      background:rgba(10,10,10,.88);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }
    .topbar-title small{
      display:block;
      font-size:.76rem;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:var(--soft);
      margin-bottom:2px;
    }
    .topbar-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      appearance:none;
      border:1px solid var(--line-2);
      background:transparent;
      color:var(--text);
      padding:12px 16px;
      border-radius:16px;
      cursor:pointer;
      transition:.2s ease;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .btn:hover{background:rgba(255,255,255,.05)}
    .btn-primary{
      background:var(--white);
      color:var(--black);
      border-color:var(--white);
      font-weight:600;
    }
    .btn-primary:hover{opacity:.92;background:var(--white)}
    .btn-hero{padding:14px 18px}
    .save-msg{padding:0 24px 12px;color:#74d399;font-size:.95rem;display:none}

    .editor-shell{
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.03);
      display:block;
    }
    .editor-shell.hidden{display:none}
    .editor-grid{
      max-width:var(--max);
      margin:0 auto;
      padding:24px;
      display:grid;
      gap:20px;
      grid-template-columns:repeat(auto-fit,minmax(310px,1fr));
    }
    .editor-card{
      background:#111;
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
    }
    .editor-card h4{
      margin:0 0 14px;
      text-transform:uppercase;
      letter-spacing:.2em;
      font-size:.78rem;
      color:var(--soft);
    }
    .field{margin-bottom:12px}
    .field label{
      display:block;
      font-size:.92rem;
      color:#d6d6d6;
      margin-bottom:6px;
    }
    .field input,.field textarea{
      width:100%;
      background:#1a1a1a;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 12px;
      outline:none;
    }
    .field textarea{min-height:90px;resize:vertical}
    .field input:focus,.field textarea:focus{border-color:rgba(255,255,255,.25)}
    .array-item{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:12px;
      background:#121212;
    }
    .array-head{
      display:flex;justify-content:flex-end;margin-bottom:8px;
    }
    .icon-btn{
      border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:1rem;
    }
    .icon-btn:hover{color:var(--white)}
    .sub-actions{display:flex;justify-content:flex-end}
    .upload-preview{
      border:1px dashed var(--line);
      border-radius:18px;
      overflow:hidden;
      min-height:160px;
      background:#161616;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--soft);
      text-align:center;
      padding:18px;
      margin-top:8px;
    }
    .upload-preview img{width:100%;height:200px;object-fit:cover}
    .inline-actions{display:flex;gap:8px;flex-wrap:wrap}
    .small-btn{
      border:1px solid var(--line);
      background:transparent;
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
    }
    .small-btn:hover{background:rgba(255,255,255,.05)}

    .hero{
      position:relative;
      overflow:hidden;
      border-bottom:1px solid var(--line);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.09), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    }
    .hero-grid{
      display:grid;
      gap:40px;
      grid-template-columns:1.1fr .9fr;
      align-items:center;
      padding:88px 0 106px;
    }
    .badge{
      display:inline-flex;
      border:1px solid var(--line-2);
      border-radius:999px;
      padding:8px 12px;
      font-size:.78rem;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:#ddd;
      margin-bottom:18px;
    }
    .hero-copy .lead{margin-top:24px;max-width:680px}
    .hero-copy .body{margin-top:20px;max-width:680px}
    .hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:28px}
    .hero-media{position:relative}
    .hero-frame{
      aspect-ratio:4/5;
      padding:18px;
      border:1px solid var(--line);
      border-radius:36px;
      background:#151515;
      box-shadow:var(--shadow);
    }
    .hero-frame-inner{
      height:100%;
      border-radius:28px;
      border:1px dashed var(--line-2);
      background:#0f0f0f;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--soft);
      padding:24px;
    }
    .hero-frame-inner img{width:100%;height:100%;object-fit:cover}
    .hook-card{
      position:absolute;
      left:-16px;
      bottom:-16px;
      width:min(260px,65%);
      padding:16px;
      border-radius:20px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.5);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }
    .hook-card p:last-child{margin-top:8px;color:#d7d7d7;font-size:.95rem}

    .section-title{max-width:760px;margin-bottom:34px}
    .cards-3{display:grid;gap:20px;grid-template-columns:repeat(3,1fr)}
    .cards-4{display:grid;gap:20px;grid-template-columns:repeat(4,1fr)}
    .card{padding:24px}
    .card p{margin-top:12px;color:var(--muted);line-height:1.8}

    .story-grid{display:grid;gap:32px;grid-template-columns:1.1fr .9fr}
    .story-stack{display:grid;gap:18px}
    .story-block{padding:24px}
    .story-block p:last-child{margin-top:12px;color:var(--muted);line-height:1.8}
    .notes-card{padding:24px}
    .notes-list{display:grid;gap:14px;margin-top:18px}
    .notes-list p{color:var(--muted)}

    .character-card .portrait{
      aspect-ratio:4/3;
      border:1px dashed var(--line-2);
      border-radius:20px;
      overflow:hidden;
      background:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--soft);
      margin-bottom:18px;
    }
    .character-card .portrait img{width:100%;height:100%;object-fit:cover}
    .character-card .role{font-size:.78rem;text-transform:uppercase;letter-spacing:.22em;color:var(--soft)}
    .character-card h3{margin-top:8px}
    .character-card p:last-child{margin-top:12px}

    .mechanics-grid{
      display:grid;
      gap:32px;
      grid-template-columns:1fr 1fr;
      align-items:start;
    }
    .mechanics-list{
      display:grid;
      gap:14px;
      grid-template-columns:repeat(2,1fr);
    }
    .mechanic{padding:18px 20px;color:#d4d4d4}

    .media-card{padding:16px}
    .media-box{
      aspect-ratio:4/5;
      border:1px dashed var(--line-2);
      border-radius:24px;
      background:#111;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--soft);
      padding:18px;
    }
    .media-box img{width:100%;height:100%;object-fit:cover}

    .sound-grid{
      display:grid;gap:14px;grid-template-columns:repeat(5,1fr)
    }
    .sound-chip{
      padding:16px 18px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#111;
      color:#d6d6d6;
      text-align:center;
    }

    .trailer-wrap{
      display:grid;
      gap:28px;
      grid-template-columns:1fr;
    }
    .video-shell{
      border:1px solid var(--line);
      border-radius:28px;
      overflow:hidden;
      background:#111;
      min-height:420px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--soft);
      padding:24px;
    }
    .video-shell iframe{width:100%;aspect-ratio:16/9;border:none;display:block}

    .devlog-list{display:grid;gap:18px}
    .devlog-item{padding:22px}
    .devlog-item .date{
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.22em;
      color:var(--soft);
      margin-bottom:10px;
    }
    .devlog-item p:last-child{color:var(--muted)}

    .cta-card{
      padding:30px;
      text-align:center;
    }
    .cta-card h2{max-width:880px;margin:10px auto 0}
    .cta-card .hero-actions{justify-content:center}

    .footer{
      padding:28px 0 50px;
      color:var(--soft);
      font-size:.95rem;
    }

    @media (max-width: 980px){
      .hero-grid,.story-grid,.mechanics-grid{grid-template-columns:1fr}
      .cards-3{grid-template-columns:1fr}
      .cards-4{grid-template-columns:repeat(2,1fr)}
      .sound-grid{grid-template-columns:repeat(2,1fr)}
      .hook-card{position:static;width:100%;margin-top:16px}
    }

    @media (max-width: 720px){
      .container{padding:0 18px}
      .topbar-inner,.editor-grid{padding-left:18px;padding-right:18px}
      .section{padding:56px 0}
      .hero-grid{padding:66px 0 82px}
      .cards-4,.mechanics-list,.sound-grid{grid-template-columns:1fr}
      .btn,.btn-hero,.small-btn{width:100%;justify-content:center}
      .topbar-actions,.hero-actions,.inline-actions{width:100%}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-title">
        <small>Game Site Builder</small>
        <strong>WYSIWYG staging editor</strong>
      </div>
      <div class="topbar-actions">
        <button class="btn" id="toggleModeBtn">Preview mode</button>
        <button class="btn btn-primary" id="exportBtn">Export content</button>
      </div>
    </div>
    <div class="save-msg" id="saveMsg">Content JSON exported.</div>
  </div>

  <div class="editor-shell" id="editorShell">
    <div class="editor-grid" id="editorGrid"></div>
  </div>

  <main id="siteRoot"></main>

 <script>
    const initialData = {
      game: {
        title: "CRYOGENIC",
        tagline: "A quiet routine. A wrong feeling. A shift that should have ended hours ago.",
        genre: "Narrative Horror / Psychological Tension",
        status: "In Development",
        description: "The cryo-chambers were supposed to be silent. But inside Unit 7, a pulse was detected.",
        hook: "A familiar job becomes increasingly unsettling as the player notices small details that do not belong.",
        heroImage: "",
        heroButtonPrimaryLabel: "Explore the World",
        heroButtonPrimaryHref: "#story",
        heroButtonSecondaryLabel: "View Creative Slots",
        heroButtonSecondaryHref: "#media"
      },
      featureCards: [],
      storyBlocks: [],
      writingNotes: [],
      characterCards: [],
      mechanics: [],
      mediaItems: [],
      soundtrackNotes: [],
      trailer: { embedUrl: "", title: "Teaser", placeholder: "Paste URL" },
      devlog: [],
      cta: { label: "Wishlist", headline: "Stay Updated", primaryLabel: "Steam", primaryHref: "#", secondaryLabel: "Discord", secondaryHref: "#" }
    };

    // --- FIX: LOCAL STORAGE PERSISTENCE ---
    const STORAGE_KEY = "game_site_builder_data";
    
    function loadSavedData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(initialData));
    }

    function persistData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    let data = loadSavedData();
    let editMode = true;

    // --- END FIX ---

    const siteRoot = document.getElementById("siteRoot");
    const editorGrid = document.getElementById("editorGrid");
    const editorShell = document.getElementById("editorShell");
    const saveMsg = document.getElementById("saveMsg");
    const toggleModeBtn = document.getElementById("toggleModeBtn");
    const exportBtn = document.getElementById("exportBtn");

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[s]));
    }

    function normalizeYoutubeUrl(raw) {
      const value = (raw || "").trim();
      if (!value) return "";
      if (value.includes("/embed/")) return value;
      const match = value.match(/(?:v=|youtu\.be\/)([\w-]{6,})/);
      return match ? `https://www.youtube.com/embed/${match[1]}` : value;
    }

    function showSavedMessage(text) {
      saveMsg.textContent = text;
      saveMsg.style.display = "block";
      clearTimeout(showSavedMessage._timer);
      showSavedMessage._timer = setTimeout(() => {
        saveMsg.style.display = "none";
      }, 2500);
    }

    function render() {
      persistData(); // Auto-save on every render
      if (editMode) {
        editorShell.classList.remove("hidden");
        renderEditor();
      } else {
        editorShell.classList.add("hidden");
      }
      renderPreview();
    }

    function updateField(path, value) {
      const parts = path.split(".");
      let current = data;
      for (let i = 0; i < parts.length - 1; i++) current = current[parts[i]];
      current[parts[parts.length - 1]] = value;
      render();
    }

    // Standard Export Function
    exportBtn.addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "game-site-content.json";
      a.click();
      showSavedMessage("Content exported to JSON file.");
    });

    toggleModeBtn.addEventListener("click", () => {
      editMode = !editMode;
      toggleModeBtn.textContent = editMode ? "Preview mode" : "Edit mode";
      render();
    });

    // ... (Keep your existing renderEditor and renderPreview functions here) ...
    // Note: ensure they call updateField or render() to trigger the persistData() logic.

    render();
</script>
